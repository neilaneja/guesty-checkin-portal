<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-In Signage</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @media print {
      body { margin: 0; }
      .no-print { display: none !important; }
      .sign { box-shadow: none !important; border: 2px solid #DDD !important; page-break-inside: avoid; }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F0F0F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* ── Controls (not printed) ── */
    .controls {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      margin-bottom: 32px;
      max-width: 500px;
      width: 100%;
    }
    .controls h2 {
      font-size: 1.1rem;
      margin-bottom: 16px;
    }
    .control-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .control-row label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    .control-row input {
      padding: 10px 12px;
      border: 1px solid #DDD;
      border-radius: 8px;
      font-size: 0.95rem;
      width: 100%;
    }
    .control-row .field { flex: 1; min-width: 200px; }
    .btn-generate {
      padding: 12px 24px;
      background: #2C3E50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
    }
    .btn-print {
      padding: 12px 24px;
      background: #E67E22;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── The Sign ── */
    .sign {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 48px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      text-align: center;
    }
    .sign-header {
      font-size: 1.6rem;
      font-weight: 700;
      color: #2C3E50;
      margin-bottom: 8px;
    }
    .sign-subtitle {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 32px;
    }
    .qr-wrapper {
      display: inline-block;
      padding: 16px;
      background: white;
      border: 3px solid #2C3E50;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .sign-instruction {
      font-size: 1.3rem;
      font-weight: 600;
      color: #2C3E50;
      margin-bottom: 8px;
    }
    .sign-step {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
    }
    .sign-step strong {
      color: #2C3E50;
    }
    .sign-divider {
      border: none;
      border-top: 1px solid #EEE;
      margin: 24px 0;
    }
    .sign-help {
      font-size: 0.9rem;
      color: #999;
    }
    .sign-help a {
      color: #E67E22;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Controls (hidden when printing) -->
  <div class="controls no-print">
    <h2>Configure Your Check-In Sign</h2>
    <div class="control-row">
      <div class="field">
        <label>Property Name</label>
        <input type="text" id="propName" placeholder="The West End Flats">
      </div>
    </div>
    <div class="control-row">
      <div class="field">
        <label>Check-In URL</label>
        <input type="text" id="checkinUrl" placeholder="https://yourdomain.com/checkin/west-end-flats">
      </div>
    </div>
    <div class="control-row">
      <div class="field">
        <label>Fallback Phone</label>
        <input type="text" id="fallbackPhone" placeholder="(555) 123-4567">
      </div>
    </div>
    <div style="margin-top:8px;">
      <button class="btn-generate" onclick="generateSign()">Generate Sign</button>
      <button class="btn-print" onclick="window.print()">Print</button>
    </div>
  </div>

  <!-- The Sign -->
  <div class="sign" id="sign">
    <div class="sign-header" id="signHeader">Welcome!</div>
    <div class="sign-subtitle">Self Check-In</div>

    <div class="qr-wrapper">
      <div id="qrCode"></div>
    </div>

    <div class="sign-instruction">Scan to Check In</div>
    <div class="sign-step">
      <strong>1.</strong> Open your phone camera<br>
      <strong>2.</strong> Point it at the QR code above<br>
      <strong>3.</strong> Tap the link that appears<br>
      <strong>4.</strong> Enter your last name to proceed
    </div>

    <hr class="sign-divider">

    <div class="sign-help">
      Having trouble? Call us at <a href="#" id="signPhone">(555) 123-4567</a>
    </div>
  </div>

  <script>
    // Auto-fill from URL if coming from /signage/:slug
    const slug = window.location.pathname.split('/').filter(Boolean)[1] || '';

    if (slug) {
      fetch(`/api/property/${slug}`)
        .then(r => r.json())
        .then(config => {
          document.getElementById('propName').value = config.name || '';
          document.getElementById('checkinUrl').value = `${window.location.origin}/checkin/${slug}`;
          document.getElementById('fallbackPhone').value = config.fallbackPhone || '';
          generateSign();
        })
        .catch(() => {});
    }

    function generateSign() {
      const name = document.getElementById('propName').value || 'Welcome!';
      const url = document.getElementById('checkinUrl').value || 'https://example.com/checkin';
      const phone = document.getElementById('fallbackPhone').value || '(555) 123-4567';

      // Update sign text
      document.getElementById('signHeader').textContent = name;
      const phoneHref = 'tel:' + phone.replace(/[^+\d]/g, '');
      const phoneLink = document.getElementById('signPhone');
      phoneLink.textContent = phone;
      phoneLink.href = phoneHref;

      // Generate QR code
      const qrContainer = document.getElementById('qrCode');
      qrContainer.innerHTML = '';
      new QRCode(qrContainer, {
        text: url,
        width: 220,
        height: 220,
        colorDark: '#2C3E50',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.H,
      });
    }

    // Generate on load with defaults
    generateSign();
  </script>
</body>
</html>
